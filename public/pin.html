<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enter code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #111111;
        --muted: #9a9a9a;
        --border: #e5e5e5;
        --border-focus: #111111;
        --err: oklch(0.58 0.2 25);
        --ok: oklch(0.62 0.15 150);
      }

      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: "Geist", ui-sans-serif, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .stage {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .card {
        width: 100%;
        max-width: 440px;
        text-align: center;
      }

      h1 {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: -0.2px;
        margin: 0 0 28px;
      }

      .row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .cell {
        width: 48px;
        height: 58px;
        font-size: 24px;
        text-align: center;
        border: 1.5px solid var(--border);
        background: #fff;
        border-radius: 10px;
        outline: none;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-weight: 500;
        color: var(--ink);
        caret-color: var(--ink);
        transition: border-color 0.12s ease, transform 0.12s ease;
        padding: 0;
        box-sizing: border-box;
      }

      .cell:focus {
        border-color: var(--border-focus);
      }

      .row.error .cell {
        border-color: var(--err);
      }

      .row.ok .cell {
        border-color: var(--ok);
      }

      .status {
        margin-top: 18px;
        min-height: 18px;
        font-size: 13px;
        color: var(--muted);
        font-family: "Geist Mono", ui-monospace, monospace;
        letter-spacing: 0.2px;
      }

      .status.err {
        color: var(--err);
      }

      .status.ok {
        color: var(--ok);
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        15% { transform: translateX(-6px); }
        30% { transform: translateX(6px); }
        45% { transform: translateX(-4px); }
        60% { transform: translateX(4px); }
        75% { transform: translateX(-2px); }
      }

      .shake {
        animation: shake 0.42s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      }

      @media (max-width: 520px) {
        .cell {
          width: 42px;
          height: 52px;
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel">
      const CODE_LENGTH = 3;
      const ERROR_RESET_DELAY_MS = 900;
      const AUTO_SUBMIT_DELAY_MS = 60;

      function classNames(...parts) {
        return parts.filter(Boolean).join(" ");
      }

      function normalizeChars(value) {
        return (value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function CodeScreen() {
        const [digits, setDigits] = React.useState(() => Array(CODE_LENGTH).fill(""));
        const [status, setStatus] = React.useState("idle"); // idle | checking | error | ok
        const [shakeKey, setShakeKey] = React.useState(0);
        const refs = React.useRef([]);

        React.useEffect(() => {
          refs.current[0]?.focus();
        }, []);

        const resetAfterError = () => {
          setStatus("error");
          setShakeKey((key) => key + 1);
          setTimeout(() => {
            setDigits(Array(CODE_LENGTH).fill(""));
            setStatus("idle");
            refs.current[0]?.focus();
          }, ERROR_RESET_DELAY_MS);
        };

        const tryCode = async (arr) => {
          const value = arr.join("");
          if (value.length < CODE_LENGTH || status === "checking") return;

          setStatus("checking");
          try {
            const response = await fetch("/unlock", {
              method: "POST",
              headers: {
                "Accept": "application/json",
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: new URLSearchParams({ pin: value }),
            });
            const result = await response.json().catch(() => null);

            if (response.ok && result?.ok) {
              setStatus("ok");
              window.location.assign(result.location || "/");
              return;
            }
          } catch (error) {
            console.error(error);
          }

          resetAfterError();
        };

        const setAt = (index, character) => {
          const next = [...digits];
          next[index] = character;
          setDigits(next);
          return next;
        };

        const handleChange = (index, raw) => {
          const character = normalizeChars((raw || "").slice(-1));
          if (!character && raw !== "") return;

          const next = setAt(index, character);
          if (character && index < CODE_LENGTH - 1) refs.current[index + 1]?.focus();
          if (next.every(Boolean)) setTimeout(() => tryCode(next), AUTO_SUBMIT_DELAY_MS);
        };

        const handleKey = (index, event) => {
          if (event.key === "Backspace") {
            if (!digits[index] && index > 0) {
              event.preventDefault();
              setAt(index - 1, "");
              refs.current[index - 1]?.focus();
            } else if (digits[index]) {
              setAt(index, "");
            }
          } else if (event.key === "ArrowLeft" && index > 0) {
            event.preventDefault();
            refs.current[index - 1]?.focus();
          } else if (event.key === "ArrowRight" && index < CODE_LENGTH - 1) {
            event.preventDefault();
            refs.current[index + 1]?.focus();
          } else if (event.key === "Enter") {
            tryCode(digits);
          }
        };

        const handlePaste = (event) => {
          const text = normalizeChars(event.clipboardData.getData("text")).slice(0, CODE_LENGTH);
          if (!text) return;

          event.preventDefault();
          const next = Array(CODE_LENGTH).fill("");
          for (let index = 0; index < text.length; index++) next[index] = text[index];
          setDigits(next);

          if (text.length === CODE_LENGTH) setTimeout(() => tryCode(next), AUTO_SUBMIT_DELAY_MS);
          else refs.current[text.length]?.focus();
        };

        return (
          <div className="stage">
            <div className="card">
              <h1>Enter code</h1>
              <div
                key={shakeKey}
                className={classNames(
                  "row",
                  status === "error" && "error shake",
                  status === "ok" && "ok"
                )}
                onPaste={handlePaste}
              >
                {digits.map((digit, index) => (
                  <input
                    key={index}
                    ref={(element) => (refs.current[index] = element)}
                    className="cell"
                    value={digit}
                    onChange={(event) => handleChange(index, event.target.value)}
                    onKeyDown={(event) => handleKey(index, event)}
                    maxLength={1}
                    inputMode="text"
                    autoCapitalize="characters"
                    autoComplete="one-time-code"
                    spellCheck={false}
                    aria-label={`Character ${index + 1} of ${CODE_LENGTH}`}
                    disabled={status === "checking" || status === "ok"}
                  />
                ))}
              </div>
              <div
                className={classNames(
                  "status",
                  status === "error" && "err",
                  status === "ok" && "ok"
                )}
              >
                {status === "checking"
                  ? "Checking..."
                  : status === "error"
                  ? "Incorrect code"
                  : status === "ok"
                  ? "Access granted"
                  : ""}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<CodeScreen />);
    </script>
  </body>
</html>
